# Off-target-scanner build profile.
#
# Default to the portable x86-64 **baseline** so `cargo build` compiles and
# runs on ANY x86-64 machine, including older login/build nodes. The previous
# default (`target-cpu=x86-64-v3`) applied to the host too, so the build's own
# proc-macros were compiled for Haswell-or-newer (2013+) and SIGILL at build
# time on a pre-Haswell host, and the finished binary likewise refused to run
# on older CPUs. Baseline avoids both failure modes (the `wide` crate's SIMD
# falls back to scalar, which is the only cost).
#
# Opt in to a faster binary on modern hardware at build time:
#
#     # x86-64-v3 (AVX2 / BMI2 / POPCNT; Intel Haswell 2013+ / AMD Excavator+):
#     RUSTFLAGS="-C target-cpu=x86-64-v3" cargo build --release
#
#     # or tune for the exact build machine (e.g. AVX-512 on Zen 4 / Sapphire Rapids):
#     RUSTFLAGS="-C target-cpu=native" cargo build --release
#
# The conda package (conda-recipe/crispr-ots) builds x86-64-v3 by default for
# distribution (its CI hosts are modern); set CRISPR_OTS_TARGET_CPU=x86-64 to
# build the package on an older host.
