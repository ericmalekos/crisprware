name: release-crispr-ots

# Build the crispr-ots off-target scanner for each supported platform and attach
# the binaries to the GitHub Release. Triggered by pushing a version tag (e.g.
# `git tag v0.2.0 && git push --tags`); also runnable manually (workflow_dispatch),
# which just uploads the binaries as CI artifacts for inspection.
#
# Binaries are built for the portable x86-64 **baseline** (and arch defaults), so a
# downloaded binary runs on any CPU of its architecture. The musl Linux target is
# fully static (no glibc dependency) for maximum distro portability.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build crispr-ots
        working-directory: crispr-ots
        run: cargo build --release --locked -p crispr-cli --target ${{ matrix.target }}

      - name: Smoke test (the binary actually runs on this platform)
        shell: bash
        run: |
          BIN="crispr-ots/target/${{ matrix.target }}/release/crispr-ots"
          [ "${{ runner.os }}" = "Windows" ] && BIN="${BIN}.exe"
          "$BIN" --version
          "$BIN" enumerate --help >/dev/null

      - name: Package
        id: package
        shell: bash
        run: |
          cd crispr-ots/target/${{ matrix.target }}/release
          NAME="crispr-ots-${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$GITHUB_WORKSPACE/${NAME}.zip" crispr-ots.exe
            echo "asset=${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "$GITHUB_WORKSPACE/${NAME}.tar.gz" crispr-ots
            echo "asset=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset }}
          path: ${{ steps.package.outputs.asset }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
