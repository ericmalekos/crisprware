name: crisprware
# To pick up the locally-built `crispr-ots` package, set the
# CRISPR_OTS_CHANNEL env var to the absolute path of the conda channel
# dir before running `conda env create -f environment.yml` — e.g.
#
#   ./conda-recipe/build_local_channel.sh
#   CRISPR_OTS_CHANNEL=$PWD/conda-channel conda env create -f environment.yml
#
# (or, on a cluster, point it at a shared location like
# `/scratch/$USER/conda-channel`). conda evaluates the channel list
# in order, so a `file://` channel listed first beats bioconda for the
# `crispr-ots` package while everything else still resolves through
# the public channels.
channels:
  - file://${CRISPR_OTS_CHANNEL}
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.11
  - biopython>=1.8
  - crispr-ots          # off-target scanner; drop-in for guidescan
  - pybedtools>=0.9
  - matplotlib
  - pybigwig
  - gffread
  - tensorflow=2.15.*   # DeepCpf1 (Cas12a on-target); CPU build is fine for inference
  - h5py>=3.10          # legacy DeepCpf1 .h5 weight loader
  - scikit-learn>=1.3   # enPAM+GB GradientBoostingRegressor
  - joblib>=1.3         # enPAM+GB model serialization
  - pip
  - pip:
    - lightgbm==3.3.5
    - rs3==0.0.15
